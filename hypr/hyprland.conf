monitor=,preferred,auto,1

exec-once = waybar
exec-once = telegram-desktop -startintray
exec-once = swww-daemon

env = XCURSOR_SIZE,24

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }

        numlock_by_default = false

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}


general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = 0xff3a71b3
    col.inactive_border = 0x663a71b3

    layout = dwindle
}

decoration {
    rounding = 15

    # Размытие
    blur {
        enabled = yes
        size = 8
        passes = 1
        ignore_opacity = true
        new_optimizations = on
    }
    
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0
}

animations {
    enabled = true


    animation = windowsIn, 1, 6,default,slide
    animation = windowsOut, 1, 6, default, slide
    animation = workspaces, 1, 7,default,slide
}


dwindle {
    preserve_split = true # you probably want this
}

$mainMod = super

bind = $mainMod, Escape, exec, rofi -show power-menu -modi power-menu:rofi-power-menu
bind = SUPER, R, exec, wofi --show drun
bind = $mainMod, S, exec, steam

bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, C, killactive,
bind = $mainMod, F, togglefloating,
bind = $mainMod, T, layoutmsg, togglesplit

bind = , Print, exec, bash -c 'grim -g "$(slurp)" - | wl-copy'
bind = $mainMod, Print, exec, grim -g "$(slurp)" ~/screen-"$(date +%s)".png

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl s 10%-
bind = ALT, D, exec, rofi -show drun -show-icons
bind = ALT SHIFT, H, swapwindow, l
bind = ALT SHIFT, J, swapwindow, d
bind = ALT SHIFT, K, swapwindow, u
bind = ALT SHIFT, L, swapwindow, r

bind = ALT, Tab, workspace, previous

binde = ALT, L, resizeactive, 70 0
binde = ALT, H, resizeactive, -70 0
binde = ALT, K, resizeactive, 0 -70
binde = ALT, J, resizeactive, 0 70

bind = ALT, I, exec, hyprlock
bind = ALT, B, exec, firefox
bind = ALT, T, exec, Telegram
bind = ALT, X, exec, kitty
bind = ALT, y, exec, /opt/yandex-music/yandexmusic 

bind = ALT, C, killactive,
bind = ALT, Q, exit,
bind = ALT, E, exec, dolphin
bind = ALT, V, togglefloating,

bind = ALT, left, movefocus, l
bind = ALT, right, movefocus, r
bind = ALT, up, movefocus, u
bind = ALT, down, movefocus, d

bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

bind = ALT SHIFT, 1, movetoworkspacesilent, 1
bind = ALT SHIFT, 2, movetoworkspacesilent, 2
bind = ALT SHIFT, 3, movetoworkspacesilent, 3
bind = ALT SHIFT, 4, movetoworkspacesilent, 4
bind = ALT SHIFT, 5, movetoworkspacesilent, 5
bind = ALT SHIFT, 6, movetoworkspacesilent, 6
bind = ALT SHIFT, 7, movetoworkspacesilent, 7
bind = ALT SHIFT, 8, movetoworkspacesilent, 8
bind = ALT SHIFT, 9, movetoworkspacesilent, 9
bind = ALT SHIFT, 0, movetoworkspacesilent, 10


bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
