general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    monitor = 
    path = ~/.config/hypr/desktop-wallpaper.jpg
    blur_passes = 3
    blur_size = 1
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 1)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(0, 0, 0)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    fail_text = LOH
    hide_input = false
    position = 0, 210
    halign = center
    valign = center
}

label {
    monitor =
    text = Время: $TIME
    color = rgba(0, 0, 0, 1.0)
    font_size = 24
    font_family = Inter
    position = 0, -210
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT
    color = rgba(0, 0, 0, 1.0)
    font_size = 24
    font_family = Inter
    position = 0, -250
    halign = center
    valign = center
}
